<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Presensi Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div id="loginBox" class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h4 class="text-center mb-4">Login Karyawan</h4>
        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="emailInput" class="form-control" placeholder="Masukkan email terdaftar">
        </div>
        
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" id="passwordInput" class="form-control" placeholder="Masukkan password">
        </div>
        
        <button onclick="prosesLogin()" class="btn btn-primary w-100 fw-bold">Masuk</button>
    </div>

    <div id="dashboardBox" class="card shadow p-4 text-center" style="width: 100%; max-width: 400px; display: none;">
        <h4 class="mb-4">Panel Presensi</h4>
        
        <div class="alert alert-success mb-4 text-start">
            <small>✅ Perangkat terhubung (Token Aktif)</small>
        </div>
        
        <button onclick="submitCheckIn()" class="btn btn-success w-100 mb-3 fs-5 shadow-sm">
            Check-In Sekarang
        </button>
        
        <button onclick="submitCheckOut()" class="btn btn-danger w-100 mb-4 fs-5 shadow-sm">
            Pulang (Check-Out)
        </button>
        
        <hr>
        <button onclick="prosesLogout()" class="btn btn-outline-secondary w-100">
            Keluar (Hapus Sesi)
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
